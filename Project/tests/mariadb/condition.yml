---
- name: Wait for MariaDB to start
  ansible.builtin.wait_for:
    path: "{{ socket }}"
    state: present
    timeout: 60

- name: Set query facts
  ansible.builtin.set_fact:
    vehicle_id: "186"
    query_start_time: "2024-12-02T17:42:54"
    query_end_time: "2024-12-02T17:52:54"
    min_lon: "13.0"
    max_lon: "15.0"
    min_lat: "50.0"
    max_lat: "51.0"

- name: Set start datetime fact
  ansible.builtin.set_fact:
    start_datetime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

- name: Perform Range + Geo Lookup
  community.mysql.mysql_query:
    login_unix_socket: "{{ socket }}"
    login_db: "{{ db_database }}"
    query: >
      SELECT VehicleID FROM {{ db_table }}
      WHERE VehicleID = {{ vehicle_id }}
      AND GpsTime BETWEEN '{{ query_start_time }}' AND '{{ query_end_time }}'
      AND Longitude BETWEEN {{ min_lon }} AND {{ max_lon }}
      AND Latitude BETWEEN {{ min_lat }} AND {{ max_lat }}
  register: _query_raw
  vars:
    ansible_python_interpreter: /usr/bin/python3

- name: Register query execution in shell-compatible format
  ansible.builtin.set_fact:
    query_execution:
      stderr_lines:
        - "DURATION_SECONDS={{ (_query_raw.execution_time_ms[0] / 1000) | round(2) }}"

- name: Set end datetime fact
  ansible.builtin.set_fact:
    end_datetime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

- name: Get number of rows returned
  community.mysql.mysql_query:
    login_unix_socket: "{{ socket }}"
    login_db: "{{ db_database }}"
    query: >
      SELECT COUNT(VehicleID) AS cnt FROM {{ db_table }}
      WHERE VehicleID = {{ vehicle_id }}
      AND GpsTime BETWEEN '{{ query_start_time }}' AND '{{ query_end_time }}'
      AND Longitude BETWEEN {{ min_lon }} AND {{ max_lon }}
      AND Latitude BETWEEN {{ min_lat }} AND {{ max_lat }}
  register: _rows_raw
  vars:
    ansible_python_interpreter: /usr/bin/python3

- name: Register rows returned in shell-compatible format
  ansible.builtin.set_fact:
    query_rows_returned:
      stdout: "{{ _rows_raw.query_result[0][0].cnt | string }}"
