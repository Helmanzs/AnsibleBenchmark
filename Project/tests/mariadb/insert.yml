---
- name: Restart MariaDB service
  ansible.builtin.service:
    name: mariadb
    state: restarted

- name: Wait for MariaDB to start
  ansible.builtin.wait_for:
    path: "{{ socket }}"
    state: present
    timeout: 60

- name: Empty table before import
  community.mysql.mysql_query:
    login_unix_socket: "{{ socket }}"
    login_db: "{{ db_database }}"
    query: "TRUNCATE TABLE {{ db_table }}"
  vars:
    ansible_python_interpreter: /usr/bin/python3

- name: Set start datetime fact
  ansible.builtin.set_fact:
    start_datetime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

- name: Copy data
  ansible.builtin.copy:
    src: "{{ ansible_role_dir }}/{{ vm_name }}/files/{{ data_tar }}"
    dest: "/tmp/{{ data_tar }}"
    mode: "0644"

- name: Extract data
  ansible.builtin.shell: |
    tar --extract --use-compress-program=pigz \
    --file="/tmp/{{ data_tar }}" \
    --directory="/tmp"
    rm -f "/tmp/{{ data_tar }}"
    chmod 0666 "/tmp/{{ data_file }}"
  args:
    executable: /bin/bash
  changed_when: true

- name: Drop secondary indexes before load
  ansible.builtin.shell: |
    mariadb {{ db_database }} -S {{ socket }} -e "
    ALTER TABLE {{ db_table }}
    DROP INDEX IF EXISTS idx_topic,
    DROP INDEX IF EXISTS idx_plate;"
  args:
    executable: /bin/bash
  changed_when: false

- name: Import data
  ansible.builtin.shell: |
    /usr/bin/time -f "DURATION_SECONDS=%e" \
    mariadb {{ db_database }} -S {{ socket }} -e "
    LOAD DATA INFILE '/tmp/{{ data_file }}'
    INTO TABLE {{ db_table }}
    FIELDS TERMINATED BY ',' ENCLOSED BY '\"' 
    LINES TERMINATED BY '\n' 
    IGNORE 1 ROWS
    (
        orig_id,
        @orig_time,
        orig_topic,
        @CreatedTime,
        @GpsTime,
        GsmSignal,
        SatelliteCount,
        LicensePlate,
        VehicleType,
        Company,
        VehicleID,
        Technology,
        Ignition,
        Longitude,
        Latitude,
        SpeedGps,
        SpeedTach,
        SpeedCan,
        TachoGps,
        TachoTach,
        ModeDrive,
        SpreadingMode,
        Plow,
        Gram,
        WidthLeft,
        WidthRight,
        SumSalt,
        SumInert,
        SumBrine,
        Cuts1,
        Cuts2,
        Cuts3,
        CentralBroom,
        LeftBroom,
        RightBroom,
        Turbine,
        RunningShaft,
        LeftFlushing,
        RightFlushing,
        CentralFlushing,
        Misting,
        Pump,
        LightOn,
        ModeArrow,
        AkuVoltage,
        RampUp,
        Crash,
        TempAir,
        TempRoad,
        Revs,
        RevsExtension,
        Fuel,
        LevelPHM,
        PowerVoltage,
        Lighthouse
    )
    SET
        orig_time   = STR_TO_DATE(@orig_time, '%Y-%m-%dT%H:%i:%s.%f'),
        CreatedTime = STR_TO_DATE(@CreatedTime, '%Y-%m-%dT%H:%i:%s.%f'),
        GpsTime     = STR_TO_DATE(@GpsTime, '%Y-%m-%dT%H:%i:%s.%f');"
  args:
    executable: /bin/bash
  register: query_execution
  changed_when: true

- name: Set end datetime fact
  ansible.builtin.set_fact:
    end_datetime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

- name: Recreate indexes after load
  ansible.builtin.shell: |
    mariadb {{ db_database }} -S {{ socket }} -e "
    ALTER TABLE {{ db_table }}
    ADD INDEX IF NOT EXISTS idx_topic (orig_topic),
    ADD INDEX IF NOT EXISTS idx_plate (LicensePlate);"
  args:
    executable: /bin/bash
  changed_when: false

- name: Remove data file
  ansible.builtin.file:
    path: "/tmp/{{ data_file }}"
    state: absent
