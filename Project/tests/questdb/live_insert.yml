---
# tests/questdb/live_insert.yml

- name: Set live_insert defaults
  ansible.builtin.set_fact:
    workers: "{{ workers | default(4) | int }}"
    duration: "{{ duration | default(60) | int }}"
    batch_size: "{{ batch_size | default(500) | int }}"
    ts_step_ms: "{{ ts_step_ms | default(100) | int }}"

- name: Ensure benchmark directory exists on VM
  ansible.builtin.file:
    path: /opt/bench
    state: directory
  register: bench_dir

- name: Deploy shared benchmark files to VM
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ bench_dir.path }}/"
  loop:
    - "{{ project_root }}/tests/generate_live_data.py"
    - "{{ project_root }}/tests/runner.py"
    - "{{ project_root }}/tests/base_driver.py"

- name: Deploy {{ database }} driver to VM
  ansible.builtin.copy:
    src: "{{ project_root }}/tests/{{ database }}/driver.py"
    dest: "{{ bench_dir.path }}/driver.py"

- name: Build vehicle-id list for all workers
  ansible.builtin.set_fact:
    all_vehicle_ids: "{{ range(200, 200 + (workers | int) * 10) | map('string') | join(',') }}"

- name: Restart QuestDB service
  ansible.builtin.service:
    name: questdb
    state: restarted

- name: Wait for QuestDB Postgres port
  ansible.builtin.wait_for:
    host: "{{ db_host }}"
    port: "{{ db_port }}"
    timeout: 60
    delay: 2

- name: Truncate QuestDB table
  ansible.builtin.shell: |
    psql postgresql://{{ db_user }}:{{ db_password }}@{{ db_host }}:{{ db_port }}/{{ db_database }} \
      -c "TRUNCATE TABLE {{ db_table }};"
  args:
    executable: /bin/bash

- name: Run live insert benchmark
  ansible.builtin.command: >
    python3 {{ bench_dir.path }}/runner.py
    --driver-path {{ bench_dir.path }}/driver.py
    --host localhost
    --port 9009
    --table {{ db_table }}
    --duration {{ duration }}
    --workers {{ workers }}
    --batch-size {{ batch_size }}
    --seed 42
    --vehicle-ids "{{ all_vehicle_ids }}"
    --ts-step-ms {{ ts_step_ms }}
    --output {{ bench_dir.path }}/live_result.json
  register: bench_run

- name: Load benchmark JSON results
  ansible.builtin.slurp:
    src: "{{ bench_dir.path }}/live_result.json"
  register: bench_result_b64

- name: Decode benchmark results
  ansible.builtin.set_fact:
    bench_result: "{{ bench_result_b64.content | b64decode | from_json }}"

- name: Set facts for common-post-processing
  ansible.builtin.set_fact:
    start_datetime: "{{ bench_result.start_datetime }}"
    end_datetime: "{{ bench_result.end_datetime }}"
    rows_returned: "{{ bench_result.total_rows }}"
    query_duration_ms: "{{ bench_result.query_duration_sec }}"
    worker_stats: "{{ bench_result.worker_stats }}"
    avg_p50_latency_ms: >-
      {{
        (
          (bench_result.worker_results | map(attribute='p50_latency_ms') | map('float') | sum)
          / (bench_result.worker_results | length)
        ) | round(3)
      }}
    avg_p99_latency_ms: >-
      {{
        (
          (bench_result.worker_results | map(attribute='p99_latency_ms') | map('float') | sum)
          / (bench_result.worker_results | length)
        ) | round(3)
      }}
