- name: Stop MongoDB
  ansible.builtin.systemd:
    name: mongod
    state: stopped

- name: Remove MongoDB data
  ansible.builtin.file:
    path: /var/lib/mongodb
    state: absent

- name: Recreate MongoDB data directory
  ansible.builtin.file:
    path: /var/lib/mongodb
    state: directory
    owner: mongodb
    group: mongodb
    mode: "0755"

- name: Start MongoDB
  ansible.builtin.systemd:
    name: mongod
    state: started

- name: Wait for MongoDB to accept client connections
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ db_port }}"
    state: started
    delay: 2
    timeout: 60

- name: Push and extract data
  ansible.builtin.unarchive:
    src: "{{ ansible_role_dir }}/{{ vm_name }}/files/{{ data_tar }}"
    dest: "/tmp/"
    mode: "0777"

- name: Set start datetime fact
  ansible.builtin.set_fact:
    start_datetime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

- name: Import data
  ansible.builtin.shell: |
    /usr/bin/time -f "DURATION_SECONDS=%e" \
    mongoimport \
    --uri=mongodb://{{ db_host }}:{{ db_port }}/{{ db_database }} \
    --collection={{ db_table }} \
    --file=/tmp/{{ data_file }}
  args:
    executable: /bin/bash
  register: query_execution
  changed_when: true

- name: Set end datetime fact
  ansible.builtin.set_fact:
    end_datetime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

- name: Remove data file
  ansible.builtin.file:
    path: /tmp/{{ data_file }}
    state: absent
