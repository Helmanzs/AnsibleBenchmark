---
- name: Set query facts
  ansible.builtin.set_fact:
    vehicle_id: "186"
    query_start_time: "2024-12-02T17:42:54Z"
    query_end_time: "2024-12-02T17:52:54Z"
    min_lon: "13.0"
    max_lon: "15.0"
    min_lat: "50.0"
    max_lat: "51.0"

- name: Read token from environment file
  ansible.builtin.slurp:
    src: /root/.bashrc
  register: bashrc
  become: true

- name: Extract token
  ansible.builtin.set_fact:
    influxdb_token: >-
      {{ (bashrc.content | b64decode
          | regex_search('INFLUXDB3_AUTH_TOKEN=(.*)', '\1')
          | trim
          | regex_replace('"|\[|\]|\'', '')
        ) }}

- name: Set start datetime fact
  ansible.builtin.set_fact:
    start_datetime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

- name: Perform Range + Geo Lookup
  ansible.builtin.shell: |
    /usr/bin/time -f "DURATION_SECONDS=%e" \
    /opt/influxdb3/influxdb3 query \
      --database {{ db_database }} \
      --format csv \
      "SELECT * FROM {{ db_table }} \
      WHERE \"VehicleID\" = '{{ vehicle_id }}' \
      AND time >= '{{ query_start_time }}' \
      AND time <= '{{ query_end_time }}' \
      AND \"Longitude\" >= {{ min_lon }} \
      AND \"Longitude\" <= {{ max_lon }} \
      AND \"Latitude\" >= {{ min_lat }} \
      AND \"Latitude\" <= {{ max_lat }}"
  environment:
    INFLUXDB3_AUTH_TOKEN: "{{ influxdb_token }}"
  register: query_execution
  changed_when: false
  become: true

- name: Set end datetime fact
  ansible.builtin.set_fact:
    end_datetime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

- name: Get number of rows returned
  ansible.builtin.shell: |
    /opt/influxdb3/influxdb3 query \
      --database {{ db_database }} \
      --format csv \
      "SELECT COUNT(*) AS cnt FROM {{ db_table }} \
      WHERE \"VehicleID\" = '{{ vehicle_id }}' \
      AND time >= '{{ query_start_time }}' \
      AND time <= '{{ query_end_time }}' \
      AND \"Longitude\" >= {{ min_lon }} \
      AND \"Longitude\" <= {{ max_lon }} \
      AND \"Latitude\" >= {{ min_lat }} \
      AND \"Latitude\" <= {{ max_lat }}" \
    | sed -n '2p'
  environment:
    INFLUXDB3_AUTH_TOKEN: "{{ influxdb_token }}"
  register: query_rows_returned
  changed_when: false
  become: true
