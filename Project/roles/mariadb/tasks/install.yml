---
- name: Install software-properties-common
  ansible.builtin.apt:
    name: software-properties-common
    state: present
    update_cache: true
  register: result
  until: result is succeeded
  retries: 10
  delay: 5

- name: Enable Universe repository
  ansible.builtin.command: add-apt-repository -y universe
  register: universe_result
  changed_when: "'component is already enabled' not in universe_result.stdout"

- name: Install packages
  ansible.builtin.apt:
    name: "{{ vm_packages }}"
    state: present
    update_cache: true
  when: vm_packages is defined and vm_packages | length > 0

- name: Configure sysctl parameters
  ansible.builtin.template:
    src: sysctl.conf.j2
    dest: /etc/sysctl.d/90-mariadb.conf
    owner: root
    group: root
    mode: "0644"
  notify: Apply sysctl settings

- name: Disable AppArmor
  ansible.builtin.systemd:
    name: apparmor
    state: stopped
    enabled: false
  ignore_errors: true

- name: Configure locale (en_US.UTF-8)
  ansible.builtin.command: localedef -i en_US -f UTF-8 en_US.UTF-8
  args:
    creates: /usr/lib/locale/en_US.utf8

- name: Apply sysctl settings immediately
  ansible.builtin.command: sysctl --system
  changed_when: false

- name: Ensure dpkg is configured
  ansible.builtin.apt:
    upgrade: dist

- name: Add MariaDB APT key
  ansible.builtin.apt_key:
    url: "{{ db_key_url }}"
    state: present
    validate_certs: true

- name: Gather distribution facts
  ansible.builtin.setup:
    gather_subset:
      - distribution

- name: Add MariaDB APT repository
  ansible.builtin.apt_repository:
    repo: >
      deb [arch=amd64]
      http://mirror.mariadb.org/repo/{{ db_version }}/ubuntu
      {{ ansible_facts['distribution_release'] | lower }} main
    state: present
    filename: mariadb
    update_cache: true
  register: repo_result
  retries: 5
  delay: 10
  until: repo_result is succeeded

- name: Install MariaDB
  ansible.builtin.apt:
    name:
      - mariadb-server
      - mariadb-backup
      - mariadb-client
    state: present
    update_cache: true
    install_recommends: false
    lock_timeout: 300
  retries: 5
  register: result
  delay: 10
  until: result is succeeded

- name: Enable local_infile for LOAD DATA
  ansible.builtin.copy:
    dest: /etc/mysql/mariadb.conf.d/99-local-infile.cnf
    content: |
      [mysqld]
      local_infile = 1
    owner: root
    group: root
    mode: "0644"
  notify: restart mariadb

- name: Disable binary logging
  ansible.builtin.copy:
    dest: /etc/mysql/mariadb.conf.d/99-disable-binlog.cnf
    content: |
      [mysqld]
      skip-log-bin
    owner: root
    group: root
    mode: "0644"
  notify: restart mariadb

- name: Ensure MariaDB is externally reachable
  ansible.builtin.copy:
    dest: /etc/mysql/mariadb.conf.d/99-bind-external.cnf
    content: |
      [mysqld]
      bind-address = 0.0.0.0
      skip-networking = 0
    owner: root
    group: root
    mode: "0644"
  notify: restart mariadb

- name: Ensure max_allowed_packet is large enough for bulk inserts
  ansible.builtin.lineinfile:
    path: /etc/mysql/mariadb.conf.d/50-server.cnf
    regexp: '^\s*#?\s*max_allowed_packet\s*='
    insertafter: '^\[mysqld\]'
    line: "max_allowed_packet = 256M"
  notify: restart mariadb

- name: Ensure MariaDB is running
  ansible.builtin.service:
    name: mariadb
    state: started
    enabled: true
